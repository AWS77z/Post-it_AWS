<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Administration</h1>
        <a href="/" class="btn btn-outline-secondary">Retour au Tableau</a>
    </div>

    <table class="table table-hover table-bordered shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Pseudo</th>
                <th>Email</th>
                <th class="text-center"> Admin</th>
                <th class="text-center"> Créer</th>
                <th class="text-center"> Modifier  </th>
                <th class="text-center"> Supprimer</th>
            </tr>
        </thead>
        <tbody>
            {%  for u in utilisateurs %}
            <tr>
                <td>{{ u.id }}</td>
                <td><strong>{{ u.pseudo }}</strong></td>
                <td>{{ u.email }}</td>
                
                <td class="text-center">
                    <input type="checkbox" class="form-check-input" 
                           onclick="changerDroit({{ u.id }}, 'admin', this.checked)" 
                           {% if u.admin %}checked{% endif %}>
                </td>
                <td class="text-center">
                    <input type="checkbox" class="form-check-input" 
                           onclick="changerDroit({{ u.id }}, 'creer', this.checked)" 
                           {% if u.creer %}checked{% endif %}>
                </td>
                <td class="text-center">
                    <input type="checkbox" class="form-check-input" 
                           onclick="changerDroit({{ u.id }}, 'modifier', this.checked)" 
                           {% if u.modifier %}checked{% endif %}>
                </td>
                <td class="text-center">
                    <input type="checkbox" class="form-check-input" 
                           onclick="changerDroit({{ u.id }}, 'supprimer', this.checked)" 
                           {% if u.supprimer %}checked{% endif %}>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        async function changerDroit(userId, colonne, valeur) {
            try {
                const response = await fetch('/admin/update_permission', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, colonne, valeur })
                });

                if (!response.ok) {
                    alert("Erreur lors de la mise à jour des droits.");
                    location.reload(); 
                } else {
                    console.log(`Droit ${colonne} mis à jour pour l'utilisateur ${userId}`);
                }
            } catch (err) {
                console.error("Erreur réseau :", err);
                alert("Impossible de contacter le serveur.");
            }
        }
    </script>
</body>
</html>
